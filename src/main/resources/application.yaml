spring:
  config:
    import: "optional:classpath:.env.properties"
  security:
    oauth2:
      client:
        google:
          client-id: ${GOOGLE_CLIENT_ID}
          client-secret: ${GOOGLE_CLIENT_SECRET}
          redirect-uri: ${GOOGLE_REDIRECT_URI}
          user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
        facebook:
          client-id: ${FACEBOOK_CLIENT_ID}
          client-secret: ${FACEBOOK_CLIENT_SECRET}
          redirect-uri: ${FACEBOOK_REDIRECT_URI}
  elasticsearch:
    uris: ${ELASTIC_URI}
    username: ${ELASTIC_USERNAME}
    password: ${ELASTIC_PASSWORD}
    connection-timeout: 5s
    read-timeout: 5s
  application:
    name: first-project
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    clean-disabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties.hibernate.format_sql: true

  redis:
    port: ${REDIS_PORT}
    host: ${REDIS_HOST}
    password: ${REDIS_PASSWORD}
    ssl: true
logging:
  level:
#    co.elastic.clients: TRACE
#    org.springframework.data.elasticsearch: DEBUG
    org.springframework.data.redis: OFF
    org.springframework.data.redis.repository: OFF
    io.lettuce.core: OFF
    redis.clients.jedis: OFF
    org.redisson: OFF
    org.hibernate.orm.jdbc.bind: trace
    # ===== ROOT =====
    root: INFO

    # ===== Reactive stack (QUAN TRỌNG) =====
    io.netty: OFF
    reactor.netty: OFF
    reactor.core: OFF

    # ===== Elasticsearch (Reactive / Spring Data) =====
    org.springframework.data.elasticsearch: OFF
    org.elasticsearch: OFF
    org.elasticsearch.client: OFF

    # ===== Spring Boot noise (optional) =====
    org.springframework.boot.actuate: OFF
cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${CLOUD_API_KEY}
  api-secret: ${CLOUD_API_SECRET}
mailServer:
  host: smtp.gmail.com
  port: 587
  email: ${EMAIL}
  password: ${MAIL_PASSWORD}
  isSSL: false
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
