
services:

  backend-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: first-demo-api:latest
    container_name: first-demo-api
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # --- Redis ---
      SPRING_DATA_REDIS_HOST: redis-cache
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

      # --- Elasticsearch ---
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch-node:9200

      # --- OAuth2 ---
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI}

      # --- JWT ---
      JWT_SECRET: ${JWT_SECRET}

      # --- Cloudinary ---
      CLOUD_NAME: ${CLOUD_NAME}
      CLOUD_API_KEY: ${CLOUD_API_KEY}
      CLOUD_API_SECRET: ${CLOUD_API_SECRET}

      # --- Mail ---
      EMAIL: ${EMAIL}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # --- App ---
      FRONTEND_URL: ${FRONTEND_URL}

    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      elasticsearch-node:
        condition: service_healthy
    networks:
      - backend-network

  frontend:
    build:
      context: ../TaskManagement
      dockerfile: .Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    image: frontend-app:latest
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"
      - "3443:443"
    depends_on:
      - backend-api
    networks:
      - backend-network

  mysql-db:
    image: mysql:8.0.35
    container_name: mysqlcontainer
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      # IMPORTANT: MYSQL_USER must NOT be 'root'.
      # 'root' is a reserved built-in user — setting it here causes
      # authentication failures. Use a dedicated app user instead.
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - backend-network
    healthcheck:
      # Authenticate as the app user, not root, for healthcheck reliability
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 45s

  redis-cache:
    image: redis:7.2-alpine
    container_name: redis-cache
    restart: unless-stopped
    # Pass REDIS_PASSWORD so Spring Boot and redis-cli both use the same secret
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  elasticsearch-node:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch-node
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Heap: min=max to avoid resizing pauses; keep ≤ 50% of container limit
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      # Disable unnecessary features that consume memory in single-node mode
      - cluster.routing.allocation.disk.threshold_enabled=false
      - logger.level=ERROR
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

networks:
  backend-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  elasticsearch-data:
    driver: local
